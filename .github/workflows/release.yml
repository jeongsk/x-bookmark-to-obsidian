name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx playwright test

      - name: Create extension ZIP
        run: |
          mkdir -p dist
          zip -r dist/x-bookmark-to-obsidian.zip \
            manifest.json \
            background.js \
            content.js \
            content.css \
            content-threads.js \
            popup.html \
            popup.js \
            icons/ \
            native-host/ \
            install_host.sh \
            -x "*.pyc" -x "__pycache__/*" -x ".git/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: dist/x-bookmark-to-obsidian.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: x-bookmark-to-obsidian.zip
          generate_release_notes: true
